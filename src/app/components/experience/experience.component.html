<div class="mb-8">
  <h2 class="text-xl font-bold border-b pb-2 mb-4">
    Experience
  </h2>

  <div *ngFor="let exp of experiences" class="mb-6">

    <div class="flex justify-between items-center">
      <h3 class="font-semibold text-lg">
        {{ exp.title }}
      </h3>
      <span class="text-sm text-gray-500">
        {{ exp.period }}
      </span>
    </div>

    <p class="text-sm text-gray-500 mb-2">
      {{ exp.company }} - {{ exp.location }}
    </p>

    <ul class="list-disc ml-5 text-sm mb-2">
      <li *ngFor="let d of exp.description">{{ d }}</li>
    </ul>

    <div class="flex flex-wrap gap-2">
      <span
        *ngFor="let tech of exp.stack"
        class="bg-blue-100 text-blue-700 text-xs px-2 py-1 rounded"
      >
        {{ tech }}
      </span>
    </div>

  </div>
</div>

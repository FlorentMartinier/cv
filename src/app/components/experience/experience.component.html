<div class="mb-8">
  <h2 class="text-xl font-bold border-b pb-2 mb-6">
    {{cv.labels.experience}}
  </h2>

  <div class="relative border-l-2 border-gray-200 ml-4 md:ml-6">

    <div *ngFor="let exp of cv.experiences; let last = last" class="mb-10 ml-8 relative" [class.mb-0]="last">

      <div
        class="absolute -left-[52px] -top-[7px] flex items-center justify-center w-10 h-10 bg-white rounded-full border-2 border-gray-200 overflow-hidden shadow-sm">
        <ng-container *ngIf="exp.logo; else defaultCircle">
          <img [src]="exp.logo" [alt]="exp.company" class="w-full h-full object-cover p-0">
        </ng-container>

        <ng-template #defaultCircle>
          <div class="w-full h-full bg-slate-100 flex items-center justify-center">
            <span class="text-[10px] text-slate-400 font-bold uppercase"></span>
          </div>
        </ng-template>
      </div>

      <div class="flex flex-col md:flex-row md:justify-between md:items-start mb-1">
        <h3 class="font-bold text-lg leading-tight">
          {{ exp.title }}
        </h3>
        <span class="text-sm font-medium text-blue-600 bg-blue-50 px-2 py-0.5 rounded print:p-0 print:text-gray-500">
          {{ exp.period }}
        </span>
      </div>

      <p class="text-sm font-semibold text-gray-700 mb-3">
        {{ exp.company }} <span class="text-gray-400 mx-1">•</span> {{ exp.location }}
      </p>

      <ul class="list-disc ml-4 text-sm text-gray-600 mb-3 space-y-1">
        <li *ngFor="let description of exp.description">{{ description }}</li>
      </ul>

      <div class="flex flex-wrap gap-2">
        <span *ngFor="let tech of exp.stack"
          class="bg-gray-100 text-gray-700 border border-gray-200 text-[11px] px-2 py-0.5 rounded font-medium print:bg-transparent">
          {{ tech }}
        </span>
      </div>
    </div>

  </div>
</div>

<div class="min-h-screen bg-gray-100 flex justify-center p-6">
  <div class="w-full max-w-5xl bg-white shadow-lg rounded-xl overflow-hidden flex">

    <!-- SIDEBAR -->
    <div class="w-1/3 bg-slate-800 text-white p-6">

      <h1 class="text-2xl font-bold mb-2">
        {{ cv.personalInfo.name }}
      </h1>

      <p class="text-slate-300 mb-6">
        {{ cv.personalInfo.title }}
      </p>

      <div class="mb-6">
        <h2 class="font-semibold mb-2 text-slate-400 uppercase text-sm">Contact</h2>
        <p class="text-sm">{{ cv.personalInfo.email }}</p>
        <p class="text-sm">{{ cv.personalInfo.phone }}</p>
        <p class="text-sm">{{ cv.personalInfo.address }}</p>
      </div>

      <app-language [languages]="cv.languages"></app-language>

    </div>

    <!-- MAIN -->
    <div class="w-2/3 p-8">

      <div class="flex justify-end mb-4">
        <button
          (click)="downloadPDF()"
          class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded shadow"
        >
          Export PDF
        </button>
      </div>

      <app-experience [experiences]="cv.experiences"></app-experience>
      <app-education [education]="cv.education"></app-education>
      <app-project [projects]="cv.projects"></app-project>

    </div>

  </div>
</div>
